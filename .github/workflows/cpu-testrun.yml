name: CPU Testrun

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  train-and-cross-check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Build and load CPU Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile.CPU
          push: false
          load: true
          tags: nnue-pytorch:cpu
          cache-from: type=gha,scope=cpu-cache
          cache-to: type=gha,mode=max,scope=cpu-cache

      - name: Checkout Compatible Stockfish Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: official-stockfish/Stockfish
          path: Stockfish
          ref: 313ea4ab0410872e99f0668c74edc7e49e9a0b6a
          persist-credentials: false

      - name: Compile Compatible Stockfish
        run: |
          cd Stockfish/src
          make -j build

      - name: Perform Test Run of entire Training Pipeline on CPU
        run: |
          ./run_docker.sh CPU ${{ github.workspace }} --non-interactive --exec \
            python -u tests/test_training_pipeline_run.py -y --device cpu --test-dir /data/logs/training/runs/unittests_train_pipeline_cpu

      - name: Perform Cross-Check Evaluation
        run: |
          ./run_docker.sh CPU ${{ github.workspace }} --skip-setup --non-interactive --exec \
            python -u cross_check_eval.py --net /data/logs/training/runs/unittests_train_pipeline_cpu/lightning_logs/version_2/checkpoints/last.nnue --data .pgo/small.binpack --engine ./Stockfish/src/stockfish --device='cpu' \
            --checkpoint /data/logs/training/runs/unittests_train_pipeline_cpu/lightning_logs/version_2/checkpoints/last.ckpt
